<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: https: http:;">
  <title>Mako</title>
</head>
<body>
  <div id="app">
    <div id="workspace-shell">
      <aside id="sidebar" aria-label="工作区侧边栏">
        <div id="sidebar-body" class="sidebar__content"></div>
      </aside>
      <main id="main-pane">
        <div id="main-titlebar" class="window-titlebar" data-tauri-drag-region>
          <div
            id="window-title-label"
            class="window-titlebar__label"
            data-tauri-drag-region
          >Mako</div>
        </div>
        <div id="editor-shell">
          <div id="editor"></div>
          <textarea
            id="source-editor"
            class="source-editor"
            spellcheck="false"
            autocomplete="off"
            autocapitalize="off"
            autocorrect="off"
          ></textarea>
        </div>
      </main>
    </div>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
